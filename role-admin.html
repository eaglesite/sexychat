<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 50%, #f48fb1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 10px 40px rgba(244, 143, 177, 0.3);
        }

        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            color: #ec4899;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .admin-header p {
            color: #9ca3af;
            font-size: 14px;
        }

        .auth-section {
            margin-bottom: 30px;
        }

        .auth-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .auth-form input {
            padding: 12px 20px;
            border: 2px solid rgba(244, 143, 177, 0.3);
            border-radius: 12px;
            font-size: 16px;
            width: 250px;
            transition: all 0.3s ease;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.2);
        }

        .auth-form button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(236, 72, 153, 0.4);
        }

        .auth-error {
            color: #ef4444;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .roles-section {
            display: none;
        }

        .roles-section.show {
            display: block;
        }

        .roles-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .roles-header h2 {
            color: #374151;
            font-size: 20px;
        }

        .add-role-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-role-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .roles-list {
            display: grid;
            gap: 15px;
        }

        .role-card {
            background: white;
            border: 2px solid rgba(244, 143, 177, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .role-card:hover {
            border-color: #ec4899;
            box-shadow: 0 5px 20px rgba(236, 72, 153, 0.2);
        }

        .role-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .role-card-header h3 {
            color: #ec4899;
            font-size: 18px;
        }

        .role-card-header .role-id {
            color: #9ca3af;
            font-size: 12px;
        }

        .role-card-body {
            margin-bottom: 15px;
        }

        .role-card-body p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .role-card-body .system-prompt {
            background: rgba(244, 143, 177, 0.1);
            padding: 10px;
            border-radius: 8px;
            color: #374151;
            font-size: 13px;
        }

        .role-card-actions {
            display: flex;
            gap: 10px;
        }

        .role-card-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            color: white;
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(59, 130, 246, 0.4);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            color: white;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(239, 68, 68, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #ec4899;
            font-size: 20px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #374151;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid rgba(244, 143, 177, 0.3);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-footer button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cancel-btn {
            background: rgba(156, 163, 175, 0.2);
            color: #6b7280;
        }

        .cancel-btn:hover {
            background: rgba(156, 163, 175, 0.3);
        }

        .save-btn {
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            color: white;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ec4899;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            color: #9ca3af;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>✨ 角色管理</h1>
            <p>管理聊天系统的预设角色</p>
        </div>

        <div class="auth-section" id="authSection">
            <div class="auth-form">
                <input type="password" id="passwordInput" placeholder="输入管理密码">
                <button onclick="authenticate()">验证</button>
            </div>
            <div class="auth-error" id="authError"></div>
        </div>

        <div class="roles-section" id="rolesSection">
            <div class="roles-header">
                <h2>角色列表</h2>
                <button class="add-role-btn" onclick="showAddModal()">+ 添加角色</button>
            </div>
            <div class="roles-list" id="rolesList">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <a href="/" class="back-link">← 返回聊天页面</a>
    </div>

    <!-- 添加/编辑角色模态框 -->
    <div class="modal" id="roleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加角色</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>角色ID</label>
                    <input type="text" id="roleIdInput" placeholder="例如: developer">
                </div>
                <div class="form-group">
                    <label>角色名称</label>
                    <input type="text" id="roleNameInput" placeholder="例如: 编程助手">
                </div>
                <div class="form-group">
                    <label>角色描述</label>
                    <input type="text" id="roleDescInput" placeholder="例如: 精通多种编程语言的编程专家">
                </div>
                <div class="form-group">
                    <label>系统提示词</label>
                    <textarea id="rolePromptInput" placeholder="例如: 你是一位资深的编程专家..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="hideModal()">取消</button>
                <button class="save-btn" onclick="saveRole()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let adminPassword = '';
        let roles = [];
        let editingRoleId = null;

        async function authenticate() {
            const password = document.getElementById('passwordInput').value;
            if (!password) {
                document.getElementById('authError').textContent = '请输入密码';
                return;
            }

            try {
                const response = await fetch('/api/admin/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    adminPassword = password;
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('rolesSection').classList.add('show');
                    loadRoles();
                } else {
                    document.getElementById('authError').textContent = data.error || '密码错误';
                }
            } catch (error) {
                document.getElementById('authError').textContent = '验证失败，请检查服务器';
            }
        }

        async function loadRoles() {
            try {
                const response = await fetch('/api/roles');
                const data = await response.json();
                roles = data.roles;
                renderRoles();
            } catch (error) {
                document.getElementById('rolesList').innerHTML = '<div class="loading" style="color: #ef4444;">加载失败</div>';
            }
        }

        function renderRoles() {
            if (roles.length === 0) {
                document.getElementById('rolesList').innerHTML = '<div class="loading">暂无角色</div>';
                return;
            }

            document.getElementById('rolesList').innerHTML = roles.map(role => `
                <div class="role-card">
                    <div class="role-card-header">
                        <h3>${role.name}</h3>
                        <span class="role-id">ID: ${role.id}</span>
                    </div>
                    <div class="role-card-body">
                        <p><strong>描述：</strong>${role.description}</p>
                        <div class="system-prompt">${role.system_prompt}</div>
                    </div>
                    <div class="role-card-actions">
                        <button class="edit-btn" onclick="editRole('${role.id}')">编辑</button>
                        <button class="delete-btn" onclick="deleteRole('${role.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function showAddModal() {
            editingRoleId = null;
            document.getElementById('modalTitle').textContent = '添加角色';
            document.getElementById('roleIdInput').value = '';
            document.getElementById('roleIdInput').disabled = false;
            document.getElementById('roleNameInput').value = '';
            document.getElementById('roleDescInput').value = '';
            document.getElementById('rolePromptInput').value = '';
            document.getElementById('roleModal').classList.add('show');
        }

        function editRole(roleId) {
            const role = roles.find(r => r.id === roleId);
            if (!role) return;

            editingRoleId = roleId;
            document.getElementById('modalTitle').textContent = '编辑角色';
            document.getElementById('roleIdInput').value = role.id;
            document.getElementById('roleIdInput').disabled = true;
            document.getElementById('roleNameInput').value = role.name;
            document.getElementById('roleDescInput').value = role.description;
            document.getElementById('rolePromptInput').value = role.system_prompt;
            document.getElementById('roleModal').classList.add('show');
        }

        function hideModal() {
            document.getElementById('roleModal').classList.remove('show');
        }

        async function saveRole() {
            const id = document.getElementById('roleIdInput').value.trim();
            const name = document.getElementById('roleNameInput').value.trim();
            const description = document.getElementById('roleDescInput').value.trim();
            const systemPrompt = document.getElementById('rolePromptInput').value.trim();

            if (!id || !name || !description || !systemPrompt) {
                alert('请填写所有字段');
                return;
            }

            try {
                const url = editingRoleId ? '/api/admin/role/update' : '/api/admin/role/add';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: adminPassword,
                        id,
                        name,
                        description,
                        system_prompt: systemPrompt
                    })
                });

                const data = await response.json();

                if (data.success) {
                    hideModal();
                    loadRoles();
                } else {
                    alert(data.error || '操作失败');
                }
            } catch (error) {
                alert('保存失败，请检查服务器');
            }
        }

        async function deleteRole(roleId) {
            if (!confirm('确定要删除这个角色吗？')) return;

            try {
                const response = await fetch('/api/admin/role/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: adminPassword,
                        id: roleId
                    })
                });

                const data = await response.json();

                if (data.success) {
                    loadRoles();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (error) {
                alert('删除失败，请检查服务器');
            }
        }

        // 点击模态框外部关闭
        document.getElementById('roleModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideModal();
            }
        });
    </script>
</body>
</html>
